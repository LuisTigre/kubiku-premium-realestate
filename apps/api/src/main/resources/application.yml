spring:
  application:
    name: kubiku-api
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:https://mddkcrjafjkhxwscbogj.supabase.co/auth/v1}
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kubiku}
    username: ${DATABASE_USERNAME:kubiku}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8088

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    org.flywaydb: INFO
    com.kubiku.api: DEBUG
    org.springframework.security: DEBUG
