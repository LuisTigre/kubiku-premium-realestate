<!-- JavaScript for minor UI interaction -->
<script data-purpose="tab-switcher">
    // Simple script to handle active state visual for search tabs
    const buttons = document.querySelectorAll('[data-purpose="search-container"] button:not(.absolute)');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('search-tab-active'));
        btn.classList.add('search-tab-active');
      });
    });
  </script>
